<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acamp Jovem – Inscrição</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#39ff14;
  --bg:#021a30;
  --bg2:#01101f;
  --card:rgba(255,255,255,.05);
  --border:rgba(255,255,255,.12);
  --text:#fff;
  --muted:#9ca3af;
}

*{box-sizing:border-box;font-family:Inter,Arial,sans-serif}

body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(180deg,var(--bg),var(--bg2));
  color:var(--text);
}

section{padding:80px 5%}

main{
  max-width:900px;
  margin:auto;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  padding:32px;
  backdrop-filter:blur(10px);
}

h2,h3{
  font-family:Poppins,sans-serif;
  margin:0 0 24px;
}

.progress{
  height:6px;
  background:var(--border);
  border-radius:99px;
  overflow:hidden;
  margin-bottom:32px;
}
.progress div{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--primary),#00ff88);
  transition:.4s;
}

.step{display:none}
.step.active{display:block}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}
@media(max-width:768px){
  .grid{grid-template-columns:1fr}
}

label{
  font-size:.9rem;
  color:var(--muted);
  margin-bottom:6px;
  display:block;
}

input,select,textarea{
  width:100%;
  padding:14px 16px;
  border-radius:12px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.06);
  color:white;
  font-size:1rem;
}

textarea{min-height:110px}

select option{
  background:#0a2540;
  color:white;
}

.checkbox-group{
  display:flex;
  flex-direction:column;
  gap:14px;
  margin:24px 0;
}
.checkbox-group label{
  display:flex;
  align-items:center;
  gap:12px;
  font-size:.95rem;
  cursor:pointer;
}
.checkbox-group input{
  width:20px;
  height:20px;
  accent-color:var(--primary);
}

.actions{
  display:flex;
  justify-content:space-between;
  margin-top:40px;
  gap:16px;
}

button{
  background:linear-gradient(135deg,var(--primary),#00ff88);
  border:none;
  padding:14px 32px;
  border-radius:50px;
  font-weight:700;
  cursor:pointer;
}
button.secondary{
  background:transparent;
  border:1px solid var(--border);
  color:var(--muted);
}

#loading{
  position:fixed;
  inset:0;
  background:rgba(2,26,48,.96);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
.spinner{
  width:56px;
  height:56px;
  border:5px solid var(--border);
  border-top:5px solid var(--primary);
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

#successScreen{
  display:none;
  text-align:center;
  padding:60px 20px;
}
#successScreen a{
  display:inline-block;
  margin-top:20px;
  background:#25D366;
  color:white;
  padding:16px 40px;
  border-radius:50px;
  text-decoration:none;
  font-weight:700;
}
  
  .date-field{
  position:relative;
}
.date-field::after{
  content:"";
  position:absolute;
  right:16px;
  top:50%;
  transform:translateY(-50%);
  pointer-events:none;
  opacity:.6;
}
  
.date-field{ grid-column:1 / -1; }
input, select, textarea { min-width: 0; }

/* CORREÇÃO REAL PARA INPUT DATE NO MOBILE */
input[type="date"]{
  display:block;
  width:100%;
  max-width:100%;
  box-sizing:border-box;
  -webkit-appearance:none;
  appearance:none;
}



</style>
</head>

<body>
<section>
<main>

<div class="progress"><div id="bar"></div></div>

<form id="form" novalidate>

<!-- IDENTIFICAÇÃO -->
<div class="step active">
  <h3>Inscrição - ACAMP JOVEM IBC</h3>

  <div class="grid">
    <input name="Nome" placeholder="Nome completo" required>

    <div class="date-field">
      <label>Data de nascimento</label>
      <input type="date" name="Nascimento" required>
    </div>

    <input name="Idade" placeholder="Idade" required>
    <input name="Sexo" placeholder="Sexo" required>
    <input name="Igreja" placeholder="Igreja / Congregação" required>
    <input name="TelefoneParticipante" placeholder="Telefone" required>
    <input name="Cidade" placeholder="Cidade / Bairro" required>
    <input name="ConvidadoPor" placeholder="Quem convidou">
  </div>

  <div class="actions">
    <span></span>
    <button type="button" onclick="next()">Continuar</button>
  </div>
</div>

<!-- RESPONSÁVEL -->
<div class="step">
  <h3>Responsável Legal</h3>

  <div class="grid">
    <input name="ResponsavelNome" placeholder="Nome do responsável">
    <input name="ResponsavelParentesco" placeholder="Parentesco">
    <input name="ResponsavelTelefone" placeholder="Telefone">
    <input name="ResponsavelEmergencia" placeholder="Telefone emergência">

    <select name="AutorizacaoResponsavel">
      <option value="">Autoriza participação?</option>
      <option value="Sim">Sim</option>
      <option value="Não">Não</option>
    </select>
  </div>

  <div class="actions">
    <button type="button" class="secondary" onclick="back()">Voltar</button>
    <button type="button" onclick="next()">Continuar</button>
  </div>
</div>


<!-- RESPONSÁVEL -->
<div class="step">
<h3>Responsável Legal</h3>
<div class="grid">
<input name="ResponsavelNome" placeholder="Nome do responsável">
<input name="ResponsavelParentesco" placeholder="Parentesco">
<input name="ResponsavelTelefone" placeholder="Telefone">
<input name="ResponsavelEmergencia" placeholder="Telefone emergência">
<select name="AutorizacaoResponsavel">
<option value="">Autoriza participação?</option>
<option value="Sim">Sim</option>
<option value="Não">Não</option>
</select>
</div>
<div class="actions">
<button type="button" class="secondary" onclick="back()">Voltar</button>
<button type="button" onclick="next()">Continuar</button>
</div>
</div>

<!-- SAÚDE -->
<div class="step">
<h3>Saúde</h3>
<div class="grid">
<input name="Alergia" placeholder="Possui alergia?">
<input name="AlergiaDescricao" placeholder="Qual alergia?">
<input name="RestricaoAlimentar" placeholder="Restrição alimentar?">
<input name="RestricaoDescricao" placeholder="Qual restrição?">
<input name="Medicamento" placeholder="Usa medicamento contínuo?">
<input name="MedicamentoDescricao" placeholder="Qual medicamento?">
<input name="CondicaoSaude" placeholder="Condição de saúde">
<input name="TipoSanguineo" placeholder="Tipo sanguíneo">
</div>
<div class="actions">
<button type="button" class="secondary" onclick="back()">Voltar</button>
<button type="button" onclick="next()">Continuar</button>
</div>
</div>

<!-- AUTORIZAÇÕES -->
<div class="step">
<h3>Autorizações</h3>

<select name="logistica_transporte" required>
<option value="">Como irá ao local?</option>
<option value="Preciso de carona">Preciso de carona</option>
<option value="Carro próprio / responsável">Carro próprio / responsável</option>
</select>

<div class="checkbox-group">
<label><input type="checkbox" name="autorizacao_imagem" value="Sim" required> Autorizo uso de imagem</label>
<label><input type="checkbox" name="autorizacao_medica" value="Sim" required> Autorizo atendimento médico</label>
<label><input type="checkbox" name="declaracao_verdade" value="Sim" required> Declaro informações verdadeiras</label>
<label><input type="checkbox" name="ciente_regras" value="Sim" required> Estou ciente das regras</label>
</div>

<textarea name="observacoes" placeholder="Observações importantes"></textarea>

<div class="actions">
<button type="button" class="secondary" onclick="back()">Voltar</button>
<button type="button" onclick="next()">Continuar</button>
</div>
</div>

<!-- PIX -->
<div class="step">
<h3>Pagamento – PIX</h3>
<p>Valor: <strong>R$ 50,00</strong></p>
<input id="pixKey" value="39.952.787/0001-27" readonly>
<button type="button" onclick="copiarPix()">Copiar chave PIX</button>
<div class="actions">
<button type="button" class="secondary" onclick="back()">Voltar</button>
<button type="button" onclick="next()">Já paguei</button>
</div>
</div>

<!-- COMPROVANTE -->
<div class="step">
<h3>Enviar comprovante</h3>
<input type="file" id="file" required>
<div class="actions">
<button type="button" class="secondary" onclick="back()">Voltar</button>
<button type="submit">Finalizar inscrição</button>
</div>
</div>

</form>

<div id="successScreen">
<h2>Inscrição concluída 🎉</h2>
<a href="https://chat.whatsapp.com/FwddVr1MnyZ7LGlCYWPrsL" target="_blank">
Entrar no grupo do WhatsApp
</a>
</div>

</main>
</section>

<div id="loading"><div class="spinner"></div></div>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyhcUoeIShSmNFv0HNQiNsFwxHTOggHjdZ54Jryv7_RLvwCCj-JB2lNiDocPMa5dzeg/exec";

let step=0;
const steps=document.querySelectorAll(".step");
const bar=document.getElementById("bar");

function update(){
  steps.forEach((s,i)=>s.classList.toggle("active",i===step));
  bar.style.width=(step/(steps.length-1))*100+"%";
}
function next(){step++;update()}
function back(){step--;update()}

function copiarPix(){
  navigator.clipboard.writeText(document.getElementById("pixKey").value);
}

document.getElementById("form").addEventListener("submit",async e=>{
  e.preventDefault();
  loading.style.display="flex";

  const data=Object.fromEntries(new FormData(e.target));
  const file=document.getElementById("file").files[0];
  const reader=new FileReader();

  reader.onload=async()=>{
    data.comprovanteBase64=reader.result.split(",")[1];
    data.comprovanteTipo=file.type;
    data.comprovanteNome=file.name;

    await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify(data)});

    loading.style.display="none";
    form.style.display="none";
    successScreen.style.display="block";
  };
  reader.readAsDataURL(file);
});
</script>

</body>
</html>
